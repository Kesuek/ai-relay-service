<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bootstrap — AI Relay</title>
  <style>
    :root { --bg: #0f172a; --panel: #1e293b; --text: #e2e8f0; --accent: #38bdf8; --danger: #ef4444; --success: #22c55e; }
    body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); display: grid; place-items: center; min-height: 100vh; margin: 0; }
    .box { background: var(--panel); padding: 2rem; border-radius: 1rem; width: min(90%, 420px); box-shadow: 0 20px 50px rgba(0,0,0,0.4); }
    h1 { margin-top: 0; font-size: 1.25rem; }
    label { display: block; margin-top: 1rem; font-size: 0.875rem; }
    input { width: 100%; padding: 0.5rem; margin-top: 0.25rem; border-radius: 0.375rem; border: 1px solid #334155; background: #0f172a; color: var(--text); box-sizing: border-box; }
    button { margin-top: 1.5rem; width: 100%; padding: 0.625rem; background: var(--accent); color: #082f49; border: none; border-radius: 0.375rem; font-weight: 600; cursor: pointer; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .error { color: var(--danger); font-size: 0.875rem; margin-top: 0.75rem; }
    .success { color: var(--success); font-size: 0.875rem; margin-top: 0.75rem; white-space: pre-wrap; }
    .warning { background: #451a03; color: #fdba74; padding: 0.75rem; border-radius: 0.375rem; font-size: 0.875rem; margin-bottom: 1rem; }
  </style>
</head>
<body>
  <div class="box">
    <h1>Create First Admin</h1>
    <div class="warning">You are logged in with the master seed. Create the first human admin account now. Store the generated temporary password securely.</div>
    <form id="form">
      <label for="username">Username</label>
      <input type="text" id="username" required>

      <label for="email">Email (optional)</label>
      <input type="email" id="email">

      <button type="submit" id="submit">Create admin</button>
      <div id="message" class="error"></div>
    </form>
  </div>
  <script src="/relay/v2/dashboard/static/bootstrap.js"></script>
</body>
</html>
