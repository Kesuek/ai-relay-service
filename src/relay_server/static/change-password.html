<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Change Password — AI Relay</title>
  <style>
    :root { --bg: #0f172a; --panel: #1e293b; --text: #e2e8f0; --accent: #38bdf8; --danger: #ef4444; }
    body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); display: grid; place-items: center; min-height: 100vh; margin: 0; }
    .box { background: var(--panel); padding: 2rem; border-radius: 1rem; width: min(90%, 360px); box-shadow: 0 20px 50px rgba(0,0,0,0.4); }
    h1 { margin-top: 0; font-size: 1.25rem; }
    label { display: block; margin-top: 1rem; font-size: 0.875rem; }
    input { width: 100%; padding: 0.5rem; margin-top: 0.25rem; border-radius: 0.375rem; border: 1px solid #334155; background: #0f172a; color: var(--text); box-sizing: border-box; }
    button { margin-top: 1.5rem; width: 100%; padding: 0.625rem; background: var(--accent); color: #082f49; border: none; border-radius: 0.375rem; font-weight: 600; cursor: pointer; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .hint { font-size: 0.75rem; color: #94a3b8; margin-top: 0.25rem; }
    .error { color: var(--danger); font-size: 0.875rem; margin-top: 0.75rem; }
    .success { color: #22c55e; font-size: 0.875rem; margin-top: 0.75rem; }
  </style>
</head>
<body>
  <div class="box">
    <h1>Change Password</h1>
    <p>Your account is using a temporary or reset password. You must choose a new password before continuing.</p>
    <form id="form">
      <label for="current">Current password</label>
      <input type="password" id="current" required>

      <label for="new">New password</label>
      <input type="password" id="new" minlength="12" required>
      <div class="hint">At least 12 characters.</div>

      <label for="confirm">Confirm new password</label>
      <input type="password" id="confirm" minlength="12" required>

      <button type="submit" id="submit">Change password</button>
      <button type="button" id="logout" style="background:#334155;color:#e2e8f0;margin-top:0.5rem;">Logout</button>
      <div id="message" class="error"></div>
    </form>
  </div>
  <script>
    async function getCsrfToken() {
      const m = document.cookie.split(';').map(c => c.trim()).find(c => c.startsWith('relay_csrf='));
      return m ? decodeURIComponent(m.split('=')[1]) : '';
    }
    document.getElementById('form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const current = document.getElementById('current').value;
      const next = document.getElementById('new').value;
      const confirm = document.getElementById('confirm').value;
      const msg = document.getElementById('message');
      const btn = document.getElementById('submit');
      msg.textContent = '';
      if (next !== confirm) { msg.textContent = 'Passwords do not match.'; return; }
      if (next.length < 12) { msg.textContent = 'Password must be at least 12 characters.'; return; }
      btn.disabled = true;
      try {
        const res = await fetch('/relay/v2/dashboard/api/me/password', {
          method: 'POST',
          headers: { 'X-CSRF-Token': await getCsrfToken() },
          body: new URLSearchParams({ current_password: current, new_password: next }),
        });
        if (res.ok) {
          msg.className = 'success';
          msg.textContent = 'Password changed. Redirecting...';
          setTimeout(() => location.href = '/relay/v2/dashboard/', 1500);
        } else {
          const body = await res.json().catch(() => ({}));
          msg.className = 'error';
          msg.textContent = body.detail || `Failed (${res.status})`;
        }
      } finally { btn.disabled = false; }
    });
    document.getElementById('logout').addEventListener('click', async () => {
      await fetch('/relay/v2/dashboard/logout', { method: 'POST', headers: { 'X-CSRF-Token': await getCsrfToken() } });
      location.href = '/relay/v2/dashboard/login';
    });
  </script>
</body>
</html>
