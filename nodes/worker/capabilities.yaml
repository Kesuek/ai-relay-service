# =============================================================================
# capabilities.yaml – template for generic worker nodes
# =============================================================================
#
# Each capability describes a feature of the node.
# Fields:
#   name        – unique identifier (e.g. "chat.llama3")
#   type        – ai | tool | script | workflow | resource
#   description – human-readable description
#   version     – semver
#   available   – true/false (can be toggled at runtime)
#   config      – provider-specific configuration (free-form JSON)
#   metadata    – optional extra data (e.g. GPU info, max_connections)
# =============================================================================

worker_name: "generic-worker-01"

capabilities:
  # ---- AI / LLM ---------------------------------------------------------
  - name: "chat.openai"
    type: ai
    description: "OpenAI GPT-4o chat model"
    version: "1.0.0"
    available: true
    config:
      model: "gpt-4o"
      provider: "openai"
      api_key_env: "OPENAI_API_KEY"
      max_tokens: 8192
      temperature: 0.7

  - name: "chat.llama3"
    type: ai
    description: "Llama 3.1 8B via Ollama (local)"
    version: "1.0.0"
    available: true
    config:
      model: "llama3.1:8b"
      provider: "ollama"
      endpoint: "http://localhost:11434"
      max_tokens: 4096
      temperature: 0.7

  - name: "embedding.bge"
    type: ai
    description: "BGE-Small embedding model for RAG"
    version: "1.0.0"
    available: true
    config:
      model: "bge-small-en-v1.5"
      provider: "ollama"
      endpoint: "http://localhost:11434"
      dimensions: 384

  # ---- TOOLS ------------------------------------------------------------
  - name: "tool.ffmpeg"
    type: tool
    description: "FFmpeg for audio/video conversion"
    version: "1.0.0"
    available: true
    config:
      binary: "/usr/bin/ffmpeg"
      max_duration_seconds: 3600

  - name: "tool.pdftotext"
    type: tool
    description: "PDF-to-text conversion via pdftotext"
    version: "1.0.0"
    available: true
    config:
      binary: "/usr/bin/pdftotext"
      max_pages: 500

  - name: "tool.webscrape"
    type: tool
    description: "Website extraction via HTTP"
    version: "1.0.0"
    available: true
    config:
      timeout_seconds: 30
      max_content_length: 500000
      allowed_domains: []

  # ---- SCRIPTS (run outside the AI, triggered by it) ---------------------
  - name: "script.data-cleanup"
    type: script
    description: "CSV cleanup and normalization"
    version: "0.1.0"
    available: true
    config:
      script: "scripts/cleanup_csv.py"
      timeout: 120
      sandbox: true

  - name: "script.report-gen"
    type: script
    description: "Generates weekly reports from database dumps"
    version: "0.1.0"
    available: true
    config:
      script: "scripts/weekly_report.py"
      timeout: 300

  # ---- WORKFLOWS (multi-step pipelines) ---------------------------------
  - name: "workflow.data-pipeline"
    type: workflow
    description: "CSV import -> cleanup -> DB insert -> report"
    version: "0.1.0"
    available: true
    config:
      steps:
        - name: "import"
          capability: "script.data-cleanup"
        - name: "report"
          capability: "script.report-gen"

  # ---- RESOURCES --------------------------------------------------------
  - name: "resource.postgres"
    type: resource
    description: "PostgreSQL database access"
    version: "1.0.0"
    available: true
    config:
      host: "db.internal"
      port: 5432
      database: "relay_data"
      # No password here – comes from ~/.relay/secrets/
      ssl: true